name: deploy-backend

# Push to dev  -> deploys the DEV backend  (api.dev.ambitiousyou.pro, Supabase dev)
# Push to main -> deploys the PROD backend (api.ambitiousyou.pro,    Supabase prod)
# Path-filtered so frontend-only changes don't redeploy the backend.
on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/backend/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # GitHub Environment supplies the per-env secrets (DATABASE_URL, etc.).
    # Names MUST match the environments in repo Settings exactly (case-sensitive):
    # `Production` (main branch) / `Development` (any other branch).
    environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Development (dev branch)' }}
    env:
      DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      IMAGE: ghcr.io/${{ github.repository_owner }}/ambitiousyou-backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Full graph install so drizzle-kit (a devDependency) is available.
      - name: Install (backend + workspace deps)
        run: pnpm install --frozen-lockfile --filter backend...

      # Surface the REAL connection target + error before migrating — drizzle-kit
      # hides both behind its spinner. Prints host/port/user (password stays
      # masked) and fails fast (10s) with the actual error instead of a ~2-min hang.
      - name: Verify DB connectivity
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node -e "const v=process.env.DATABASE_URL||''; if(v!==v.trim())console.log('WARNING: DATABASE_URL has leading/trailing whitespace (len '+v.length+' vs trimmed '+v.trim().length+')'); try{const u=new URL(v.trim()); console.log('Target -> host='+u.hostname+' port='+(u.port||'5432')+' user='+decodeURIComponent(u.username)+' params='+(u.search||'(none)'));}catch(e){console.log('URL parse error: '+e.message+' (password may contain unescaped special characters)');}"
          node -e "const {Client}=require('pg'); const c=new Client({connectionString:process.env.DATABASE_URL, connectionTimeoutMillis:10000}); c.connect().then(()=>c.query('select 1')).then(()=>{console.log('DB connection OK');return c.end();}).then(()=>process.exit(0)).catch(e=>{console.error('DB connection FAILED:', e.message);process.exit(1);});"

      # Apply migrations to the target DB BEFORE swapping containers.
      # Keep schema changes expand/contract-safe (old container keeps serving).
      - name: Run DB migrations
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm exec drizzle-kit migrate

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ env.DEPLOY_ENV }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Ship the latest deploy.sh to the VPS so it's always present and in sync
      # with the repo — no manual copy step. Lands at /opt/ambitiousyou/deploy.sh
      # (strip_components drops the infra/ prefix). Needs /opt/ambitiousyou to
      # exist + be writable by VPS_USER (created by setup-vps.sh); if this step
      # fails with "no such directory", CI is hitting a wrong/un-provisioned host.
      - name: Ship deploy.sh to the VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: infra/deploy.sh
          target: /opt/ambitiousyou
          strip_components: 1

      # Zero-downtime blue-green swap on the VPS (see infra/deploy.sh). Prints
      # hostname/whoami/ls first so a wrong-host VPS_HOST is obvious in the log.
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Connected to host=$(hostname) as user=$(whoami)"
            ls -la /opt/ambitiousyou/ || true
            chmod +x /opt/ambitiousyou/deploy.sh
            bash /opt/ambitiousyou/deploy.sh ${{ env.DEPLOY_ENV }} ${{ env.IMAGE }}:${{ github.sha }}
