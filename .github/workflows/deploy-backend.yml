name: deploy-backend

# Push to dev  -> deploys the DEV backend  (api-dev.ambitiousyou.pro, Supabase dev)
# Push to main -> deploys the PROD backend (api.ambitiousyou.pro,    Supabase prod)
# Path-filtered so frontend-only changes don't redeploy the backend.
on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/backend/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # GitHub Environment supplies the per-env secrets (DATABASE_URL, etc.)
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    env:
      DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      IMAGE: ghcr.io/${{ github.repository_owner }}/ambitiousyou-backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Full graph install so drizzle-kit (a devDependency) is available.
      - name: Install (backend + workspace deps)
        run: pnpm install --frozen-lockfile --filter backend...

      # Apply migrations to the target DB BEFORE swapping containers.
      # Keep schema changes expand/contract-safe (old container keeps serving).
      - name: Run DB migrations
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm exec drizzle-kit migrate

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ env.DEPLOY_ENV }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Zero-downtime blue-green swap on the VPS (see infra/deploy.sh).
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /opt/ambitiousyou/deploy.sh ${{ env.DEPLOY_ENV }} ${{ env.IMAGE }}:${{ github.sha }}
