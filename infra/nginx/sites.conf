# /etc/nginx/sites-available/ambitiousyou.conf  (symlink into sites-enabled)
# Initial HTTP-only blocks. `certbot --nginx -d api.ambitiousyou.pro -d
# api.dev.ambitiousyou.pro` rewrites these to add `listen 443 ssl` + the cert
# paths and an 80->443 redirect. The `upstream backend_{prod,dev}` blocks are
# defined in /etc/nginx/conf.d/upstream-{prod,dev}.conf and swapped by deploy.sh.

server {
    listen 80;
    server_name api.ambitiousyou.pro;

    # Health/uptime checks can be noisy — keep access logs lean if desired.
    location / {
        proxy_pass http://backend_prod;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

server {
    listen 80;
    server_name api.dev.ambitiousyou.pro;

    location / {
        proxy_pass http://backend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
